<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Not found · Chess Workspace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=Libre+Baskerville&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--canopy-900:#142b1a; --canopy-800:#1e4028; --canopy-300:#90c49e; --canopy-50:#f0f9f3;
        --slate-800:#162338; --tortoise-200:#e4c898; --tortoise-400:#b07830;}
  *{box-sizing:border-box; margin:0; padding:0}
  body{min-height:100vh; display:grid; place-items:center; text-align:center; padding:24px;
       background:linear-gradient(140deg,var(--canopy-900),var(--canopy-800) 60%,var(--slate-800));
       color:var(--canopy-50); font-family:'Libre Baskerville',Georgia,serif; -webkit-font-smoothing:antialiased}
  .k{font-family:'DM Mono',monospace; text-transform:uppercase; letter-spacing:.18em; font-size:11px; color:var(--canopy-300); margin-bottom:18px}
  h1{font-family:'Playfair Display',serif; font-size:84px; font-weight:600; line-height:1; margin-bottom:8px}
  h1 em{font-style:italic; color:var(--canopy-300)}
  p{font-style:italic; color:#d4e6d9; max-width:380px; margin:0 auto 26px; line-height:1.6}
  a{font-family:'DM Mono',monospace; font-size:13px; letter-spacing:.04em; color:var(--tortoise-200); text-decoration:none; border-bottom:1px solid var(--tortoise-400); padding-bottom:2px}
  a:hover{color:#fff}
</style>
</head>
<body>
  <div>
    <p class="k">Chess · Learning Workspace</p>
    <h1>4<em>0</em>4</h1>
    <p>This square is empty. The piece you're looking for isn't on the board.</p>
    <a href="/">← Back to the lessons</a>
  </div>
</body>
</html>
